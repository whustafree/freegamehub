name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Restore custom app icon (prevent Capacitor overwrite)
        run: |
          git checkout -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml 2>/dev/null || true
          git checkout -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml 2>/dev/null || true

      - name: Create keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/gameradar-release.keystore 2>/dev/null && echo "Keystore created" || echo "WARNING: Invalid base64"
          fi

      - name: Build Android (AAB + APKs)
        run: |
          cd android
          chmod +x gradlew
          if [ -f gameradar-release.keystore ]; then
            export KEYSTORE_PATH="$GITHUB_WORKSPACE/android/gameradar-release.keystore"
            export KEYSTORE_PASSWORD="${{ secrets.KEYSTORE_PASSWORD }}"
            export KEY_ALIAS="${{ secrets.KEY_ALIAS }}"
            export KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"
          fi
          ./gradlew bundleRelease assembleRelease assembleDebug

      - name: Generate version tag
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DATE=$(date +'%Y%m%d')
          echo "tag=v${VERSION}-build-${DATE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "app_name=GameRadar-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Rename APK files with version
        run: |
          APP_NAME="${{ steps.version.outputs.app_name }}"
          
          # Debug APK
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "android/app/build/outputs/apk/debug/${APP_NAME}-debug.apk"
          fi
          
          # Release APK
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/${APP_NAME}-release.apk"
          fi
          
          # Release AAB
          if [ -f android/app/build/outputs/bundle/release/app-release.aab ]; then
            cp android/app/build/outputs/bundle/release/app-release.aab "android/app/build/outputs/bundle/release/${APP_NAME}.aab"
          fi

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GameRadar v${{ steps.version.outputs.version }}
          body: |
            ## 🎮 GameRadar v${{ steps.version.outputs.version }}

            **Commit:** `${{ github.sha }}`

            ### 📦 Archivos incluidos:
            - `${{ steps.version.outputs.app_name }}-release.apk` — APK firmado listo para instalar
            - `${{ steps.version.outputs.app_name }}-debug.apk` — APK de depuración
            - `${{ steps.version.outputs.app_name }}.aab` — Bundle para Play Store
          files: |
            android/app/build/outputs/apk/release/GameRadar-v*.apk
            android/app/build/outputs/apk/debug/GameRadar-v*.apk
            android/app/build/outputs/bundle/release/GameRadar-v*.aab
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
